<svg id="hero-logo-svg" viewBox="0 0 1200 158" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
    <title>Инфо Логотип</title>
    <defs>
        <!-- Оранжевый градиент -->
        <linearGradient id="grad-orange" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop stop-color="#F7B213" offset="0%"></stop>
            <stop stop-color="#EB7B08" offset="100%"></stop>
        </linearGradient>
        <!-- Серый градиент -->
        <linearGradient id="grad-grey" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop stop-color="#C8C8C8" offset="0%"></stop>
            <stop stop-color="#979797" offset="100%"></stop>
        </linearGradient>
        
        <!-- Мягкая маска для скребка -->
        <mask id="reveal-mask" maskUnits="userSpaceOnUse">
    <!-- Прямоугольник с градиентной заливкой -->
    <rect id="mask-rect" x="0" y="-250" width="1200" height="250" fill="url(#mask-grad)" />
    
    <defs>
        <!-- Градиент, который создает "мягкий край" -->
        <linearGradient id="mask-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="white" />         <!-- Полностью видно -->
            <stop offset="70%" stop-color="white" />        <!-- Начинает таять -->
            <stop offset="100%" stop-color="transparent" /> <!-- Полностью скрыто -->
        </linearGradient>
    </defs>
</mask>
    </defs>

